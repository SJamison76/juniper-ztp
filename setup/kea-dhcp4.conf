{
"Dhcp4": {
    "interfaces-config": {
        "interfaces": [ "enp2s0" ]
    },

    "lease-database": {
        "type": "memfile",
        "persist": true,
        "name": "/var/lib/kea/kea-leases4.csv"
    },

    "valid-lifetime": 600,
    "max-valid-lifetime": 7200,

    "option-def": [
        {
            "name": "ztp-file-server",
            "code": 150,
            "type": "ipv4-address",
            "array": true,
            "space": "dhcp4"
        },
        {
            "name": "image-file-name",
            "code": 0,
            "type": "string",
            "space": "vendor-encapsulated-options-space"
        },
        {
            "name": "config-file-name",
            "code": 1,
            "type": "string",
            "space": "vendor-encapsulated-options-space"
        },
        {
            "name": "image-file-type",
            "code": 2,
            "type": "string",
            "space": "vendor-encapsulated-options-space"
        },
        {
            "name": "transfer-mode",
            "code": 3,
            "type": "string",
            "space": "vendor-encapsulated-options-space"
        }
    ],

    "client-classes": [
        {
            "name": "juniper-access",
            "test": "substring(option[60].text,0,14) == 'Juniper-ex2300' or substring(option[60].text,0,14) == 'Juniper-ex3400' or substring(option[60].text,0,14) == 'Juniper-ex4100' or substring(option[60].text,0,14) == 'Juniper-ex4650' or substring(option[60].text,0,12) == 'Juniper-mx20' or substring(option[60].text,0,14) == 'Juniper-srx300'"
        },
        {
            "name": "juniper-aggcore",
            "test": "substring(option[60].text,0,14) == 'Juniper-ex4600' or substring(option[60].text,0,11) == 'Juniper-qfx'"
        },
        {
            "name": "catch-all-other",
            "test": "not (member('juniper-access') or member('juniper-aggcore'))"
        }
    ],

    "subnet4": [
        {
            "id": 1,
            "subnet": "192.168.10.0/24",
            "option-data": [
                {
                    "name": "routers",
                    "data": "192.168.10.1"
                },
                {
                    "name": "domain-name-servers",
                    "data": "8.8.8.8, 8.8.4.4"
                }
            ],
            "pools": [
                {
                    "pool": "192.168.10.10 - 192.168.10.100",
                    "client-classes": [ "juniper-access" ],
                    "option-data": [
                        {
                            "name": "ztp-file-server",
                            "data": "192.168.10.1"
                        },
                        {
                            "name": "vendor-encapsulated-options"
                        },
                        {
                            "name": "transfer-mode",
                            "space": "vendor-encapsulated-options-space",
                            "data": "ftp"
                        },
                        {
                            "name": "config-file-name",
                            "space": "vendor-encapsulated-options-space",
                            "data": "config/access.conf"
                        }
                    ]
                },
                {
                    "pool": "192.168.10.101 - 192.168.10.200",
                    "client-classes": [ "juniper-aggcore" ],
                    "option-data": [
                        {
                            "name": "ztp-file-server",
                            "data": "192.168.10.1"
                        },
                        {
                            "name": "vendor-encapsulated-options"
                        },
                        {
                            "name": "transfer-mode",
                            "space": "vendor-encapsulated-options-space",
                            "data": "ftp"
                        },
                        {
                            "name": "config-file-name",
                            "space": "vendor-encapsulated-options-space",
                            "data": "config/aggcore.conf"
                        }
                    ]
                },
                {
                    "pool": "192.168.10.201 - 192.168.10.253",
                    "client-classes": [ "catch-all-other" ]
                }
            ]
        }
    ]
}
}
